name: Aggiorna Feed

on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Aggiorna feed
        run: python update_feed.py
      - name: Commit e push
        run: |
          git config user.email "178868473+MonsterKingu@users.noreply.github.com"
          git config user.name "MonsterKingu"
          git add feed_ilruggitodelconiglio.xml
          git diff --staged --quiet || git commit -m "Aggiorna feed $(date +%Y-%m-%d)"
          git push
